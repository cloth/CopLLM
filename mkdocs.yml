site_name: CopLLM
site_description: Corporate AI Workspace — RAG-basierte KI-Assistenten fuer KMU
site_author: CLX Digital
site_url: https://cloth.github.io/CopLLM/
copyright: "&copy; 2026 CLX Digital — KI-Agentur Leipzig"

theme:
  name: material
  language: de
  logo: https://api.iconify.design/mdi/robot-happy-outline.svg?color=%23ffffff
  favicon: https://api.iconify.design/mdi/robot-happy-outline.svg?color=%230094FF
  palette:
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Light Mode
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Dark Mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/cloth/CopLLM
repo_name: cloth/CopLLM

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cloth/CopLLM
      name: GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: Inhalt

plugins:
  - search:
      lang: de

nav:
  - Start: index.md
  - Setup:
      - Supabase: 01-setup-supabase.md
      - Ollama: 02-setup-ollama.md
      - LiteLLM: 03-setup-litellm.md
      - Open WebUI: 04-setup-open-webui.md
      - n8n Sync: 05-setup-n8n-sync.md
  - Betrieb:
      - Kunden-Rollout: 06-kunden-rollout.md
      - Demo-Skript: 07-demo-skript.md
      - Troubleshooting: 08-troubleshooting.md
      - Hacks & Learnings: 09-hacks-und-learnings.md
  - Skalierung:
      - 1000+ Kunden: 10-skalierung.md
      - LLM-Kosten: 11-llm-kosten-monitoring.md
  - Integrationen: 12-integrationen.md
  - Architektur: architecture.md
