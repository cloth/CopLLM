site_name: CopLLM — Corporate AI Workspace
site_description: RAG-basierte KI-Assistenten fuer KMU im DACH-Raum
site_author: CLX Digital

theme:
  name: material
  language: de
  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light Mode
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark Mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: de

nav:
  - Start: index.md
  - Setup:
      - Supabase: runbook/01-setup-supabase.md
      - Ollama: runbook/02-setup-ollama.md
      - LiteLLM: runbook/03-setup-litellm.md
      - Open WebUI: runbook/04-setup-open-webui.md
      - n8n Sync: runbook/05-setup-n8n-sync.md
  - Betrieb:
      - Kunden-Rollout: runbook/06-kunden-rollout.md
      - Demo-Skript: runbook/07-demo-skript.md
      - Troubleshooting: runbook/08-troubleshooting.md
      - Hacks & Learnings: runbook/09-hacks-und-learnings.md
  - Skalierung:
      - 1000+ Kunden: runbook/10-skalierung.md
      - LLM-Kosten: runbook/11-llm-kosten-monitoring.md
  - Integrationen: runbook/12-integrationen.md
  - Architektur: docs/architecture.md

docs_dir: .
