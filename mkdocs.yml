site_name: CopLLM — Corporate AI Workspace
site_description: RAG-basierte KI-Assistenten fuer KMU im DACH-Raum
site_author: CLX Digital

theme:
  name: material
  language: de
  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light Mode
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark Mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

plugins:
  - search:
      lang: de

nav:
  - Start: index.md
  - Setup:
      - Supabase: 01-setup-supabase.md
      - Ollama: 02-setup-ollama.md
      - LiteLLM: 03-setup-litellm.md
      - Open WebUI: 04-setup-open-webui.md
      - n8n Sync: 05-setup-n8n-sync.md
  - Betrieb:
      - Kunden-Rollout: 06-kunden-rollout.md
      - Demo-Skript: 07-demo-skript.md
      - Troubleshooting: 08-troubleshooting.md
      - Hacks & Learnings: 09-hacks-und-learnings.md
  - Skalierung:
      - 1000+ Kunden: 10-skalierung.md
      - LLM-Kosten: 11-llm-kosten-monitoring.md
  - Integrationen: 12-integrationen.md
  - Architektur: architecture.md
