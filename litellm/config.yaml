# =============================================================================
# CopLLM — LiteLLM Router-Konfiguration
# Modell-Routing mit Kostenoptimierung und Fallback
# Docs: https://docs.litellm.ai/docs/
# =============================================================================

model_list:
  # --- Anthropic Claude (Hauptmodelle) ---
  - model_name: "claude-sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"
      max_tokens: 4096
      temperature: 0.3

  - model_name: "claude-opus"
    litellm_params:
      model: "anthropic/claude-opus-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"
      max_tokens: 4096
      temperature: 0.2

  - model_name: "claude-haiku"
    litellm_params:
      model: "anthropic/claude-haiku-4-5-20251001"
      api_key: "os.environ/ANTHROPIC_API_KEY"
      max_tokens: 4096
      temperature: 0.3

  # --- Ollama Lokal (Fallback / DSGVO-sicher) ---
  - model_name: "llama-local"
    litellm_params:
      model: "ollama/llama3.3"
      api_base: "os.environ/OLLAMA_BASE_URL"
      max_tokens: 4096
      temperature: 0.4
      stream: true

  # --- Default-Modell (Open WebUI Standard) ---
  - model_name: "copllm-default"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"
      max_tokens: 4096
      temperature: 0.3

  # --- Demo-Modell (eingeschraenkt, nur fuer Demo-Accounts) ---
  # Virtual Keys mit plan=demo werden auf dieses Modell beschraenkt.
  # Kuerzer (2048 Tokens) und guenstiger als Sonnet.
  - model_name: "claude-haiku-demo"
    litellm_params:
      model: "anthropic/claude-haiku-4-5-20251001"
      api_key: "os.environ/ANTHROPIC_API_KEY"
      max_tokens: 2048
      temperature: 0.3

# --- Router-Einstellungen ---
router_settings:
  routing_strategy: "cost-based-routing"

  # Fallback-Kette: Wenn Claude nicht erreichbar → Ollama
  fallbacks:
    - "claude-opus": ["claude-sonnet", "llama-local"]
    - "claude-sonnet": ["llama-local"]
    - "claude-haiku": ["llama-local"]
    - "claude-haiku-demo": ["llama-local"]
    - "copllm-default": ["llama-local"]

  # Globales Sicherheitsnetz gegen missbräuchliche Nutzung
  max_parallel_requests: 50

  num_retries: 2
  retry_after: 5
  timeout: 120
  allowed_fails: 3
  cooldown_time: 60

# --- Allgemeine Einstellungen ---
litellm_settings:
  set_verbose: false
  drop_params: true

  # Budget-Limit (globales Sicherheitsnetz)
  max_budget: 500.0
  budget_duration: "1mo"

  # Cache fuer wiederholte Fragen
  cache: true
  cache_params:
    type: "local"
    ttl: 3600

# --- API-Zugang ---
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"

  # Datenbank fuer Virtual Keys + Per-Kunde Budget-Tracking
  # Ermoeglicht: POST /key/generate, GET /spend/logs, Per-Key Budgets
  # Tabellen werden automatisch erstellt beim ersten Start
  # WICHTIG: Muss gesetzt sein damit Demo-Budget-Limits funktionieren!
  database_url: "os.environ/LITELLM_DATABASE_URL"

  # Alerting bei Kostenüberschreitung (optional, aber empfohlen)
  # Sendet Slack-Nachricht wenn globales Budget 60% erreicht (300 EUR)
  alerting: ["slack"]
  alerting_threshold: 300
  slack_alerting_url: "os.environ/SLACK_WEBHOOK_URL"
